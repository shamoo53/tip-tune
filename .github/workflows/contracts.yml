name: Soroban Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - "contracts/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "contracts/**"

jobs:
  contracts:
    name: Contracts CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/Cargo.lock') }}

      - name: Run Tests (all contracts)
        working-directory: contracts
        run: |
          set -euo pipefail
          while IFS= read -r manifest; do
            dir=$(dirname "$manifest")
            echo "Testing $dir"
            (cd "$dir" && cargo test --verbose)
          done < <(find . -name Cargo.toml -not -path '*/target/*' | sort)

      - name: Build All Contracts
        working-directory: contracts
        run: |
          set -euo pipefail
          while IFS= read -r manifest; do
            dir=$(dirname "$manifest")
            echo "Building $dir"
            (cd "$dir" && cargo build --target wasm32-unknown-unknown --release)
          done < <(find . -name Cargo.toml -not -path '*/target/*' | sort)

      - name: Lint All Contracts
        working-directory: contracts
        run: |
          set -euo pipefail
          while IFS= read -r manifest; do
            dir=$(dirname "$manifest")
            echo "Linting $dir"
            (cd "$dir" && cargo clippy -- -D warnings)
            (cd "$dir" && cargo fmt -- --check)
          done < <(find . -name Cargo.toml -not -path '*/target/*' | sort)
